<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - TiFFLu</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
</head>

<body>
    <header id="main-header">
        <div class="container nav-container">
            <a href="home.html" class="logo"><i class="ri-restaurant-2-fill"></i> TiFFLu</a>
            <nav class="nav-links">
                <a href="home.html" class="nav-link">Home</a>
                <a href="contact.html" class="nav-link active">Contact</a>
            </nav>
        </div>
    </header>

    <main id="main-content">
        <section class="section-padding">
            <div class="container grid-2">
                <div>
                    <h1>Get in Touch</h1>
                    <p style="margin-bottom: 2rem; color: #666;">Have questions? We'd love to hear from you.</p>

                    <div style="margin-bottom: 1.5rem;">
                        <h3><i class="ri-map-pin-line"></i> Address</h3>
                        <p>123 Foodie Street, Indore, MP, 452001</p>
                    </div>
                    <div style="margin-bottom: 1.5rem;">
                        <h3><i class="ri-mail-line"></i> Email</h3>
                        <p>support@tifflu.com</p>
                    </div>
                    <div style="margin-bottom: 1.5rem;">
                        <h3><i class="ri-phone-line"></i> Phone</h3>
                        <p>+91 98765 43210</p>
                    </div>
                </div>

                <div class="card">
                    <form>
                        <div class="input-group">
                            <label class="input-label">Name</label>
                            <input type="text" class="input-field" placeholder="Your Name">
                        </div>
                        <div class="input-group">
                            <label class="input-label">Email</label>
                            <input type="email" class="input-field" placeholder="your@email.com">
                        </div>
                        <div class="input-group">
                            <label class="input-label">Message</label>
                            <textarea class="input-field" rows="4" placeholder="How can we help?"></textarea>
                        </div>
                        <button class="btn btn-primary">Send Message</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="js/main.js"></script>
</body>

</html>
