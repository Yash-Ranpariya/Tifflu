<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Menu - TiFFLu</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
</head>

<body>
    <header id="main-header">
        <div class="container nav-container">
            <a href="home.html" class="logo"><i class="ri-restaurant-2-fill"></i> TiFFLu Vendor</a>
            <nav class="nav-links">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="manage-menu.html" class="nav-link active">My Menu</a>
            </nav>
        </div>
    </header>

    <main id="main-content">
        <section class="section-padding">
            <div class="container">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h1>Manage Menu</h1>
                    <button class="btn btn-primary"><i class="ri-add-line"></i> Add Item</button>
                </div>

                <div class="card">
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr style="border-bottom: 2px solid #eee; text-align: left;">
                                <th style="padding: 1rem;">Item Name</th>
                                <th style="padding: 1rem;">Price</th>
                                <th style="padding: 1rem;">Category</th>
                                <th style="padding: 1rem;">Status</th>
                                <th style="padding: 1rem;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr style="border-bottom: 1px solid #eee;">
                                <td style="padding: 1rem;">Deluxe Veg Thali</td>
                                <td style="padding: 1rem;">₹150</td>
                                <td style="padding: 1rem;">Lunch</td>
                                <td style="padding: 1rem;"><span style="color: green;">Active</span></td>
                                <td style="padding: 1rem;">
                                    <button class="btn-icon btn-sm"><i class="ri-pencil-line"></i></button>
                                    <button class="btn-icon btn-sm" style="color: red;"><i
                                            class="ri-delete-bin-line"></i></button>
                                </td>
                            </tr>
                            <tr style="border-bottom: 1px solid #eee;">
                                <td style="padding: 1rem;">Poha Jalebi</td>
                                <td style="padding: 1rem;">₹40</td>
                                <td style="padding: 1rem;">Breakfast</td>
                                <td style="padding: 1rem;"><span style="color: red;">Out of Stock</span></td>
                                <td style="padding: 1rem;">
                                    <button class="btn-icon btn-sm"><i class="ri-pencil-line"></i></button>
                                    <button class="btn-icon btn-sm" style="color: red;"><i
                                            class="ri-delete-bin-line"></i></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="js/main.js"></script>
</body>

</html>
